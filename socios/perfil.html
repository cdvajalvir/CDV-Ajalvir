<!doctype html>
<html lang="es">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <title>Mi perfil · CD Veteranos Ajalvir</title>

    <link rel="stylesheet" href="../assets/css/styles.css">
</head>

<body>

    <!-- ======================================================
         CABECERA
    ======================================================= -->

    <header class="site-header">

        <nav class="navbar container">

            <a class="brand" href="../index.html">

                <span class="brand-logo">
                    <img src="../assets/img/escudo-cdv-ajalvir.jpg"
                        alt="Escudo CD Veteranos Ajalvir">
                </span>

                <span>CD Veteranos Ajalvir</span>

            </a>

            <button class="nav-toggle" data-nav-toggle>
                ☰
            </button>

            <div class="nav-links" data-nav-links>

                <a href="index.html">
                    Socios
                </a>

                <a class="active" href="perfil.html">
                    Mi perfil
                </a>

                <button class="btn-logout" id="btnLogout">
                    Cerrar sesión
                </button>

            </div>

        </nav>

    </header>

    <!-- ======================================================
         CONTENIDO
    ======================================================= -->

    <main class="container">

        <!-- Cabecera -->

        <section class="page-hero">

            <p class="eyebrow">
                Área privada
            </p>

            <h1>
                Mi perfil
            </h1>

            <p class="lead">
                Datos registrados en la ficha del club.
            </p>

        </section>

        <!-- Datos del socio -->

        <section class="card wide">

            <div class="profile-header">

                <h2>
                    Información personal
                </h2>

                <div class="profile-actions">

                    <button
                        id="btnEditar"
                        class="btn-primary">

                        Editar perfil

                    </button>

                    <button
                        id="btnGuardar"
                        class="btn-primary"
                        hidden>

                        Guardar

                    </button>

                    <button
                        id="btnCancelar"
                        class="btn-secondary"
                        hidden>

                        Cancelar

                    </button>

                </div>

            </div>


            <div class="profile-grid" id="perfilGrid">
                <!-- Se rellena automáticamente -->
            </div>

        </section>

    </main>

    <!-- ======================================================
         JAVASCRIPT
    ======================================================= -->

    <script type="module" src="../assets/js/perfil.js"></script>

</body>

</html>
